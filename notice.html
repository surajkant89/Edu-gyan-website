<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GyanKunj Academy ✨ Notice Board</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4faf7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ========= ANIMATED BACKGROUND (moving gradient + floating orbs) ========= */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 213, 79, 0.08), rgba(253, 185, 19, 0.02) 70%),
                linear-gradient(125deg, #FFFCF5, #FFF4D6, #fff5e8);
            background-size: 200% 200%;
            animation: dreamFlow 18s ease infinite;
            z-index: -2;
        }

        /* floating abstract blobs (subtle motion) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 20%, rgba(255, 215, 150, 0.2) 0%, transparent 50%),
                repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.01) 0px, rgba(0, 0, 0, 0.01) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes dreamFlow {
            0% {
                background-position: 0% 0%;
            }

            50% {
                background-position: 100% 100%;
            }

            100% {
                background-position: 0% 0%;
            }
        }

        /* floating particles animation */
        .bg-bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 213, 79, 0.12);
            filter: blur(40px);
            pointer-events: none;
            z-index: -1;
            animation: floatPulse 25s infinite alternate ease-in-out;
        }

        @keyframes floatPulse {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }

            100% {
                transform: translate(30px, -30px) scale(1.3);
                opacity: 0.7;
            }
        }

        /* Header + Home button area */
        .header {
            text-align: center;
            padding: 32px 24px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(253, 185, 19, 0.3);
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 10;
        }

        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .title-section {
            text-align: left;
        }

        .title-section h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FDB913, #FFD54F, #E0A30F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .title-section h1::before {
            content: "📖";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #FDB913;
        }

        .title-section p {
            color: #5a4b2c;
            margin-top: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
        }

        /* Home Button (stylish & smooth) */
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #1E1E1E;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(253, 185, 19, 0.6);
        }

        .home-btn:hover {
            background: #FDB913;
            color: #1E1E1E;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(253, 185, 19, 0.4);
            border-color: transparent;
        }

        .home-btn:active {
            transform: translateY(1px);
        }

        /* container & notice cards */
        .container {
            max-width: 900px;
            margin: 40px auto 70px;
            padding: 0 20px;
        }

        /* animated board heading */
        .board-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border-left: 5px solid #FFD54F;
            padding-left: 20px;
        }

        .board-header h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #2e2a1f;
            letter-spacing: -0.2px;
        }

        .board-header h2 span {
            background: linear-gradient(145deg, #FDB913, #FFD54F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .notice-badge {
            background: rgba(253, 185, 19, 0.18);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #D49D10;
        }

        /* Card design - attractive modern */
        .note-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            padding: 22px 24px;
            border-radius: 28px;
            margin-bottom: 22px;
            box-shadow: 0 12px 28px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(253, 185, 19, 0.2);
            position: relative;
            overflow: hidden;
        }

        .note-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -14px rgba(150, 100, 0, 0.2);
            background: white;
            border-color: rgba(253, 185, 19, 0.4);
        }

        /* subtle shine animation on hover */
        .note-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0) 100%);
            transform: skewX(-15deg);
            transition: left 0.5s ease;
            pointer-events: none;
        }

        .note-card:hover::after {
            left: 150%;
        }

        /* Important tag styling */
        .note-card.important {
            background: linear-gradient(115deg, #fff9f0, #ffffff);
            border-left: 8px solid #ff4d4d;
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.08);
        }

        .note-card.important .note-title {
            color: #c7362b;
        }

        .note-title {
            font-weight: 800;
            font-size: 1.35rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            letter-spacing: -0.2px;
        }

        .title-icon {
            font-size: 1.7rem;
        }

        .note-content {
            color: #2e3b37;
            line-height: 1.5;
            font-size: 1rem;
            margin: 12px 0 14px;
            padding-right: 10px;
        }

        .note-meta {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-top: 8px;
            border-top: 1px dashed rgba(0, 0, 0, 0.05);
            padding-top: 12px;
        }

        .note-date {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6c7c74;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f0f5f2;
            padding: 4px 12px;
            border-radius: 50px;
        }

        .important-tag {
            background: #ffe8e6;
            color: #c23d2e;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* loader animation */
        .loader {
            text-align: center;
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            font-weight: 500;
            color: #E0A30F;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #FFF4D6;
            border-top: 4px solid #FDB913;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* empty state */
        .empty-state {
            background: rgba(255, 255, 240, 0.8);
            border-radius: 40px;
            padding: 48px 24px;
            text-align: center;
            font-size: 1.1rem;
            color: #5a4b2c;
            backdrop-filter: blur(8px);
            border: 1px dashed #FFD54F;
        }

        /* footer */
        .footer-note {
            text-align: center;
            padding: 30px 20px 40px;
            font-size: 0.8rem;
            color: #4f6e62;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            margin-top: 20px;
        }

        /* responsive */
        @media (max-width: 680px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .title-section {
                text-align: center;
            }

            .home-btn {
                padding: 8px 20px;
            }

            .note-card {
                padding: 18px;
            }

            .note-title {
                font-size: 1.2rem;
            }

            .board-header {
                flex-direction: column;
                gap: 12px;
            }
        }

        /* card entrance animation */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card {
            animation: fadeSlideUp 0.4s ease forwards;
        }
    </style>
</head>

<body>

    <!-- background floating bubbles (extra liveliness) -->
    <div class="bg-bubble" style="width: 280px; height: 280px; top: 5%; left: -80px;"></div>
    <div class="bg-bubble" style="width: 400px; height: 400px; bottom: 0%; right: -100px; animation-duration: 35s;">
    </div>
    <div class="bg-bubble"
        style="width: 200px; height: 200px; top: 40%; right: 20%; animation-duration: 28s; background: rgba(255, 180, 100, 0.1);">
    </div>
    <div class="bg-bubble"
        style="width: 350px; height: 350px; bottom: 20%; left: -70px; background: rgba(253, 185, 19, 0.08); animation-duration: 32s;">
    </div>

    <div class="header">
        <div class="header-content">
            <div class="title-section">
                <h1>GyanKunj Academy</h1>
                <p> Where knowledge meets innovation • Notice Board </p>
            </div>
            <button class="home-btn" id="goHomeBtn">
                <a href="index.html" style="color: rgb(31, 2, 2);"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </button>
        </div>
    </div>

    <div class="container">
        <div class="board-header">
            <h2>📢 <span>Latest Notices & Updates</span></h2>
            <div class="notice-badge">
                🔔 Stay informed • check daily
            </div>
        </div>
        <div id="notesContainer"></div>
        <div id="loader" class="loader">
            <div class="spinner"></div>
            <span>Fetching fresh updates...</span>
        </div>
    </div>

    <div class="footer-note">
        GyanKunj Academy — Empowering minds, shaping future
    </div>

    <script>
        // 🔥 Google Apps Script URL (keep original)
        const API_URL = "https://script.google.com/macros/s/AKfycbwB8newQDdhQ7NsScemfQfOWZtQTcxcYrtI619a1iA6rslkApB3-jt43heh14i6b5pj/exec";

        // Helper: format / beautify date if needed (just keep original but add nice icon)
        function formatDate(dateStr) {
            if (!dateStr) return "📅 No date specified";
            // if date already contains nice formatting just return with calendar emoji
            return `📅 ${dateStr}`;
        }

        // detect if title/content includes important keywords for additional badge
        function isImportantNote(title, content) {
            const lowerTitle = (title || "").toLowerCase();
            const lowerContent = (content || "").toLowerCase();
            return lowerTitle.includes("important") || lowerTitle.includes("urgent") || lowerContent.includes("important") || lowerContent.includes("deadline");
        }

        async function loadNotes() {
            const container = document.getElementById("notesContainer");
            const loaderDiv = document.getElementById("loader");

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                let data = await response.json();

                // Ensure data is an array
                if (!Array.isArray(data)) {
                    console.warn("API did not return array", data);
                    data = [];
                }

                loaderDiv.style.display = "none";
                container.innerHTML = "";

                if (data.length === 0) {
                    container.innerHTML = `<div class="empty-state">
                                            📭 No notices available right now.<br> 
                                            🌿 Stay tuned for updates from GyanKunj Academy.
                                        </div>`;
                    return;
                }

                // Reverse to show latest first (most recent on top)
                const reversedNotes = [...data].reverse();

                for (let note of reversedNotes) {
                    // safety: extract fields
                    const title = note.title || "Untitled Notice";
                    const content = note.content || "No additional details provided.";
                    let date = note.date || "Recently posted";

                    const importantFlag = isImportantNote(title, content);
                    const cardDiv = document.createElement("div");
                    cardDiv.className = "note-card";
                    if (importantFlag) cardDiv.classList.add("important");

                    // Choose icon based on title flavor
                    let titleIcon = "📌";
                    if (title.toLowerCase().includes("exam")) titleIcon = "📝";
                    else if (title.toLowerCase().includes("holiday")) titleIcon = "🎉";
                    else if (title.toLowerCase().includes("result")) titleIcon = "🏆";
                    else if (title.toLowerCase().includes("workshop")) titleIcon = "🔧";
                    else if (importantFlag) titleIcon = "⚠️";

                    // create inner html with attractive micro-interactions
                    cardDiv.innerHTML = `
                    <div class="note-title">
                        <span class="title-icon">${titleIcon}</span>
                        <span>${escapeHtml(title)}</span>
                        ${importantFlag ? '<span class="important-tag">🚨 IMPORTANT</span>' : ''}
                    </div>
                    <div class="note-content">${escapeHtml(content)}</div>
                    <div class="note-meta">
                        <div class="note-date">${formatDate(date)}</div>
                        <div style="font-size:0.7rem; color:#8fa79c;">📢 GyanKunj official</div>
                    </div>
                `;
                    container.appendChild(cardDiv);
                }

            } catch (error) {
                console.error("Fetch error:", error);
                loaderDiv.innerHTML = `<div style="background:#ffefed; padding:20px; border-radius:32px; color:#b3413a;">
                                        ❌ Failed to load notices. Please check connection or try again later.<br>
                                        <span style="font-size:0.85rem;">🔄 ${error.message}</span>
                                    </div>`;
            }
        }

        // Simple XSS protection
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                return c;
            });
        }

        // "Go to Home" button: smooth scroll to top (or main hero)
        function goToHome() {
            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
            // add a subtle haptic-like feedback: change button text temporarily
            const homeBtn = document.getElementById("goHomeBtn");
            if (homeBtn) {
                const originalText = homeBtn.innerHTML;
                homeBtn.innerHTML = "🏠 Welcome Home ✨";
                setTimeout(() => {
                    homeBtn.innerHTML = originalText;
                }, 1000);
            }
        }

        // Attach event listener when DOM ready
        document.addEventListener("DOMContentLoaded", () => {
            const homeBtn = document.getElementById("goHomeBtn");
            if (homeBtn) {
                homeBtn.addEventListener("click", goToHome);
            }
            loadNotes();
        });

        // Optional: add a small refresh indicator if needed, but fine.
        // Also create floating particle effect on resize (just for style)
        window.addEventListener('resize', () => { });
    </script>
</body>

</html>
